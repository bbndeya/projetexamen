<!--SECTION PARTIE-->
<section class="rdv" id="rdv">
    <div class="container">
        <h2>Prendre Rendez-Vous</h2>
        <p class="subtitle">Réservez votre consultation en quelques secondes.</p>

        <div class="rdv-content">

            <form class="rdv-form">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" placeholder="Votre nom" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Votre email" required>
                </div>

                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" placeholder="+221..." required>
                </div>

                <div class="form-group">
                    <label>Choisir un service</label>
                    <select required>
                        <option value="">-- Sélectionner --</option>
                        <option>Consultation Générale</option>
                        <option>Pédiatrie</option>
                        <option>Cardiologie</option>
                        <option>Analyse Médicale</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" required>
                </div>

                <div class="form-group">
                    <label>Heure</label>
                    <input type="time" required>
                </div>

                <div class="form-group">
                    <label>Message (optionnel)</label>
                    <textarea rows="4" placeholder="Décrivez votre problème..."></textarea>
                </div>

                <button type="submit">Confirmer le Rendez-Vous</button>
            </form>

        </div>
    </div>
</section>
  </body>
</html>
